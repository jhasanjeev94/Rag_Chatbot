name: Daily Mutual Fund Data Ingestion

on:
  schedule:
    # Runs at 10:30 AM IST (05:00 UTC) every day
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  ingest-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required to push changes back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Ingestion Pipeline
        run: |
          # Run the ingestion script to fetch new HTML and update ChromaDB
          python scripts/ingest.py
          
      - name: Commit and Push Updated VectorDB
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage vectorstore and raw data changes
          git add data/
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No new changes detected in mutual fund data."
          else
            git commit -m "Auto-update mutual fund data via daily ingestion [skip ci]"
            git push
            echo "Successfully updated and pushed new vectorstore data."
          fi
